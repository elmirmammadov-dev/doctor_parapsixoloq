<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Səhifə Tapılmadı | Şahsəddin İmanlı</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" href="/logo.webp">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #2d8157; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8faf9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .error-page { max-width: 500px; }
        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: 8rem;
            font-weight: 800;
            color: var(--gold);
            line-height: 1;
            opacity: 0.15;
        }
        .error-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #0d0c22;
            margin: -20px 0 16px;
        }
        .error-text {
            font-size: 1rem;
            color: #5a5470;
            line-height: 1.7;
            margin-bottom: 32px;
        }
        .error-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: var(--gold);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .error-btn:hover {
            background: #1f5e3d;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(45, 129, 87, 0.3);
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-code">404</div>
        <h1 class="error-title">Səhifə Tapılmadı</h1>
        <p class="error-text">Axtardığınız səhifə mövcud deyil, silinmiş və ya köçürülmüş ola bilər.</p>
        <a href="/" class="error-btn"><i class="fas fa-home"></i> Ana Səhifəyə Qayıt</a>
    </div>
</body>
</html>
